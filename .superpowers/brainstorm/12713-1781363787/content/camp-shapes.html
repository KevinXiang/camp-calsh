<div class="section" style="margin-top:24px;">
  <h3>设计要点</h3>
  <ul>
    <li><strong>剑营</strong> - 宽方堡 + 顶部交叉双剑</li>
    <li><strong>盾营</strong> - 矮胖弧顶 + 圆形城垛 + 正面盾徽</li>
    <li><strong>弓营</strong> - 高瘦尖塔 + 箭口窄窗 + 箭羽顶饰</li>
    <li><strong>投矛营</strong> - 斜顶塔 + 斜纹装饰 + 三叉戟顶</li>
  </ul>
</div>

<div class="options">
  <div class="option" data-choice="ok" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>OK，按这版做</h3>
      <p>辨识度足够，往下推进</p>
    </div>
  </div>
  <div class="option" data-choice="adjust" onclick="toggleSelect(this)">
    <div class="letter">~</div>
    <div class="content">
      <h3>方向对，但要调整</h3>
      <p>在终端告诉我哪个营地需要改</p>
    </div>
  </div>
  <div class="option" data-choice="redo" onclick="toggleSelect(this)">
    <div class="letter">×</div>
    <div class="content">
      <h3>方向不对，重新画</h3>
      <p>在终端说一下方向</p>
    </div>
  </div>
</div>
